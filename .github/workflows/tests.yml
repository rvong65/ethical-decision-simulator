# CI: offline tests (46), Docker build/health, optional Groq API smoke on main.

name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  offline-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run offline tests
        run: pytest tests/ -v --ignore=tests/test_api_integration.py

  api-smoke-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: offline-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live Groq API smoke tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: pytest tests/test_api_integration.py -v -m api

  docker-tests:
    runs-on: ubuntu-latest
    needs: offline-tests

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ethical-decision-simulator:ci .

      - name: Run offline tests inside container
        run: |
          docker run --rm ethical-decision-simulator:ci \
            pytest tests/ -v --ignore=tests/test_api_integration.py

      - name: Start app with Docker Compose
        run: docker compose up -d --wait

      - name: Verify Streamlit health endpoint
        run: curl -f http://localhost:8501/_stcore/health

      - name: Tear down containers
        if: always()
        run: docker compose down -v
